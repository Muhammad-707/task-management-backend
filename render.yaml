# Render Blueprint — task management API + PostgreSQL.
# Создаёт базу данных и веб-сервис, автоматически связывая DATABASE_URL.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: taskmgmt-db
    databaseName: taskmgmt
    user: taskmgmt
    plan: free

services:
  - type: web
    name: task-management-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # DATABASE_URL подставляется автоматически из созданной выше базы.
      - key: DATABASE_URL
        fromDatabase:
          name: taskmgmt-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGIN
        value: "*"
      # Секреты генерируются Render'ом случайно при первом деплое.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
